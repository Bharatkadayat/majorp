<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Blockchain-Based Academic Certificate Verification System" />
    
    <!-- Title -->
    <title>EduBlockchain | Academic Certificate Verification</title>
    
    <!-- Google Fonts - Inter & Poppins for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons (optional - but good for fallback) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Meta Tags for better SEO -->
    <meta name="description" content="Decentralized academic credential verification platform using blockchain technology, IPFS storage, and cryptographic hashing." />
    <meta name="keywords" content="blockchain, certificate, verification, academic, ethereum, ipfs, cryptography" />
    <meta name="author" content="EduBlockchain" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="EduBlockchain - Certificate Verification System" />
    <meta property="og:description" content="Secure, tamper-proof academic certificates on blockchain" />
    <meta property="og:type" content="website" />
    
    <!-- Favicon (you can add your own later) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    
    <!-- Theme Color for browser -->
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Tailwind CSS will be injected via PostCSS -->
  </head>
  <body class="antialiased">
    <div id="root"></div>
    
    <!-- Optional: Add a small loading indicator that disappears once React loads -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
